<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas Umum Sekolah</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f8f9fa; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .form-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; }
        .btn-add { background-color: #28a745; }
        .btn-wa { background-color: #25d366; margin-top: 10px; }
        #totalSaldo { font-weight: bold; font-size: 1.2em; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Buku Kas Umum Sekolah</h2>
    
    <div class="form-group">
        <select id="bulan">
            <option value="Januari">Januari</option><option value="Februari">Februari</option>
            <option value="Maret">Maret</option><option value="April">April</option>
            <option value="Mei">Mei</option><option value="Juni">Juni</option>
            <option value="Juli">Juli</option><option value="Agustus">Agustus</option>
            <option value="September">September</option><option value="Oktober">Oktober</option>
            <option value="November">November</option><option value="Desember">Desember</option>
        </select>
        <input type="date" id="tanggal">
        <input type="text" id="uraian" placeholder="Uraian Kegiatan">
        <select id="jenis">
            <option value="Pemasukan">Pemasukan</option>
            <option value="Pengeluaran">Pengeluaran</option>
        </select>
        <input type="number" id="nominal" placeholder="Nominal (Rp)">
        <button class="btn-add" onclick="tambahData()">Tambah</button>
    </div>

    <table id="tabelKas">
        <thead>
            <tr>
                <th>No</th><th>Bulan</th><th>Tanggal</th><th>Uraian</th><th>Jenis</th><th>Nominal</th>
            </tr>
        </thead>
        <tbody id="bodyKas"></tbody>
    </table>

    <div id="totalSaldo">Saldo Akhir: Rp 0</div>
    <button class="btn-wa" onclick="eksporKeCSV()">Download & Kirim ke WA (CSV)</button>
</div>

<script>
    let counter = 1;
    let saldo = 0;

    function tambahData() {
        const bulan = document.getElementById("bulan").value;
        const tanggal = document.getElementById("tanggal").value;
        const uraian = document.getElementById("uraian").value;
        const jenis = document.getElementById("jenis").value;
        const nominal = parseInt(document.getElementById("nominal").value) || 0;

        if (!tanggal || !uraian || !nominal) { alert("Mohon lengkapi data!"); return; }

        const table = document.getElementById("bodyKas");
        const row = table.insertRow();
        
        row.insertCell(0).innerHTML = counter++;
        row.insertCell(1).innerHTML = bulan;
        row.insertCell(2).innerHTML = tanggal;
        row.insertCell(3).innerHTML = uraian;
        row.insertCell(4).innerHTML = jenis;
        row.insertCell(5).innerHTML = nominal.toLocaleString('id-ID');

        if (jenis === "Pemasukan") saldo += nominal;
        else saldo -= nominal;

        document.getElementById("totalSaldo").innerText = "Saldo Akhir: Rp " + saldo.toLocaleString('id-ID');
    }

    function eksporKeCSV() {
        let csv = "No,Bulan,Tanggal,Uraian,Jenis,Nominal\n";
        const rows = document.querySelectorAll("#tabelKas tbody tr");
        
        rows.forEach(row => {
            let cols = row.querySelectorAll("td");
            csv += ${cols[0].innerText},${cols[1].innerText},${cols[2].innerText},${cols[3].innerText},${cols[4].innerText},${cols[5].innerText}\n;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "Data_Buku_Kas.csv";
        a.click();
        
        alert("File CSV telah diunduh. Silakan buka WhatsApp dan lampirkan file tersebut sebagai dokumen.");
    }
</script>
</body>
</html>
