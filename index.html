<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas Edunexa</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            padding: 20px 10px; 
            background-color: #f1f5f9; 
            color: #334155;
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
        }

        .logo-container { text-align: center; margin-bottom: 15px; }
        .logo-container img { max-height: 80px; object-fit: contain; }

        h2 { text-align: center; color: #1e293b; margin-top: 0; margin-bottom: 10px; font-weight: 700; letter-spacing: -0.5px; }
        
        .header-controls {
            margin-bottom: 25px;
            padding: 15px;
            background: #e0e7ff;
            border-radius: 8px;
            border: 1px solid #c7d2fe;
        }

        select.pilih-bulan {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #818cf8;
            font-weight: 600;
            color: #3730a3;
            background: white;
            width: 100%;
        }

        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 30px; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        label { font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: -10px; }

        input, textarea, button { 
            padding: 12px; border: 1px solid #cbd5e1; border-radius: 6px; 
            width: 100%; box-sizing: border-box; font-family: inherit; font-size: 14px;
        }

        input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }
        textarea { resize: vertical; min-height: 80px; } 
        
        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn { flex: 1; cursor: pointer; border: 1px solid #cbd5e1; background: white; color: #64748b; font-weight: 600; }
        
        #btnPemasukan.active { background: #10b981; color: white; border-color: #10b981; }
        #btnPengeluaran.active { background: #ef4444; color: white; border-color: #ef4444; }

        .btn-add { background-color: #3b82f6; color: white; border: none; font-weight: 600; cursor: pointer; margin-top: 5px; }
        .btn-add:hover { background-color: #2563eb; }
        
        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; background: white; }
        th, td { padding: 14px 12px; font-size: 14px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #475569; font-weight: 600; text-transform: uppercase; font-size: 12px; border-bottom: 2px solid #cbd5e1; }

        tbody tr:hover { background-color: #f1f5f9; } 
        
        th:nth-child(1), td:nth-child(1) { text-align: center; width: 15%; } 
        th:nth-child(2), td:nth-child(2) { text-align: left; width: 35%; } 
        
        th:nth-child(3), td:nth-child(3),
        th:nth-child(4), td:nth-child(4),
        th:nth-child(5), td:nth-child(5) { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
        
        td:nth-child(3) { color: #10b981; } 
        td:nth-child(4) { color: #ef4444; } 
        td:nth-child(5) { background-color: #f8fafc; color: #1e293b; } 
        
        #totalSaldo { font-weight: 700; font-size: 1.4em; margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #1e293b, #334155); color: white; text-align: right; border-radius: 8px; }

        .peringatan-histori { text-align: center; font-size: 12px; color: #ef4444; margin-top: 10px; font-weight: bold; display: none; }

        .bottom-actions { display: flex; gap: 10px; margin-top: 20px; }

        .btn-tutup {
            background-color: #f59e0b; color: white; border: none; font-weight: 600; cursor: pointer; flex: 1; padding: 14px;
        }
        .btn-tutup:hover { background-color: #d97706; }

        .btn-share { 
            background-color: #10b981; color: white; border: none; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; flex: 1; padding: 14px; transition: background-color 0.2s;
        }
        .btn-share:hover:not(:disabled) { background-color: #059669; }
        
        /* CSS Khusus saat tombol bagikan terkunci (disabled) */
        .btn-share:disabled {
            background-color: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
        }

        @media (min-width: 768px) {
            .form-row { display: flex; gap: 15px; }
            .form-row > * { flex: 1; margin-bottom: 0; }
        }
    </style>
</head>
<body onload="initApp()">

<div class="container">
    <div class="logo-container">
        <img src="https://i.ibb.co.com/JFvkRknD/Chat-GPT-Image-5-Jun-2026-22-30-27.png" alt="Logo Edunexa">
    </div>

    <h2>Buku Kas Edunexa</h2>

    <div class="header-controls">
        <select id="pilihBulan" class="pilih-bulan" onchange="gantiBulan()">
            <option value="active">-- Buku Bulan Berjalan (Aktif) --</option>
        </select>
    </div>
    
    <div id="pesanHistori" class="peringatan-histori">
        Anda sedang melihat riwayat. Data tidak dapat diubah, namun laporan bisa dibagikan.
    </div>

    <div class="form-group" id="formInputArea">
        <div class="form-row">
            <div style="flex: 1;">
                <label for="tanggal">Tanggal Transaksi</label>
                <input type="date" id="tanggal" style="margin-top: 8px;">
            </div>
            <div style="flex: 1;">
                <label>Jenis Transaksi</label>
                <div class="toggle-group" style="margin-top: 8px;">
                    <button class="toggle-btn active" id="btnPemasukan" onclick="setJenis('Pemasukan')">Pemasukan</button>
                    <button class="toggle-btn" id="btnPengeluaran" onclick="setJenis('Pengeluaran')">Pengeluaran</button>
                </div>
            </div>
        </div>

        <label for="uraian">Uraian Kegiatan</label>
        <textarea id="uraian" placeholder="Contoh: Pembelian ATK / Dana Bos Masuk"></textarea>
        
        <label for="nominal">Nominal (Rp)</label>
        <input type="text" id="nominal" inputmode="numeric" placeholder="0" oninput="formatRupiah(this)">
        
        <button class="btn-add" onclick="tambahData()">+ Tambah Transaksi</button>
    </div>

    <div class="table-responsive">
        <table id="tabelKas">
            <thead>
                <tr>
                    <th>Tanggal</th><th>Uraian</th><th>Pemasukan</th><th>Pengeluaran</th><th>Saldo</th>
                </tr>
            </thead>
            <tbody id="bodyKas"></tbody>
        </table>
    </div>

    <div id="totalSaldo">Total Saldo: Rp 0</div>
    
    <div class="bottom-actions">
        <button id="btnTutupBuku" class="btn-tutup" onclick="tutupBuku()">Tutup Buku</button>
        
        <button id="btnShare" class="btn-share" onclick="eksekusiShareBiasa()">
            <svg width="20" height="20" fill="
