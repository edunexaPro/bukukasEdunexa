<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas Edunexa</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            padding: 20px 10px; 
            background-color: #f1f5f9; 
            color: #334155;
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
        }

        /* Penempatan Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .logo-container img {
            max-height: 80px; /* Bisa disesuaikan ukurannya */
            object-fit: contain;
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 30px; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: -10px;
        }

        input, textarea, button { 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            width: 100%; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea { resize: vertical; min-height: 80px; } 
        
        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn { 
            flex: 1; 
            cursor: pointer; 
            border: 1px solid #cbd5e1; 
            background: white; 
            color: #64748b; 
            font-weight: 600; 
        }
        
        .toggle-btn:hover { background: #f1f5f9; }
        
        #btnPemasukan.active { background: #10b981; color: white; border-color: #10b981; }
        #btnPengeluaran.active { background: #ef4444; color: white; border-color: #ef4444; }

        .btn-add { 
            background-color: #3b82f6; 
            color: white; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 5px;
        }
        .btn-add:hover { background-color: #2563eb; }

        .btn-share { 
            background-color: #10b981; 
            color: white; 
            border: none; 
            width: 100%; 
            margin-top: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share:hover { background-color: #059669; }

        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; background: white; }
        th, td { padding: 14px 12px; font-size: 14px; border-bottom: 1px solid #e2e8f0; }
        
        th { 
            background-color: #f8fafc; 
            color: #475569; 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #cbd5e1;
        }

        tbody tr:hover { background-color: #f1f5f9; } 
        
        th:nth-child(1), td:nth-child(1) { text-align: center; width: 15%; } 
        th:nth-child(2), td:nth-child(2) { text-align: left; width: 35%; } 
        
        /* Font dibuat konsisten namun angkanya tetap sejajar berkat tabular-nums */
        th:nth-child(3), td:nth-child(3),
        th:nth-child(4), td:nth-child(4),
        th:nth-child(5), td:nth-child(5) { 
            text-align: right; 
            font-variant-numeric: tabular-nums; 
            font-weight: 600;
        }
        
        td:nth-child(3) { color: #10b981; } 
        td:nth-child(4) { color: #ef4444; } 
        td:nth-child(5) { background-color: #f8fafc; color: #1e293b; } 
        
        #totalSaldo { 
            font-weight: 700; 
            font-size: 1.4em; 
            margin-top: 25px; 
            padding: 20px; 
            background: linear-gradient(135deg, #1e293b, #334155); 
            color: white;
            text-align: right; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 768px) {
            .form-row { display: flex; gap: 15px; }
            .form-row > * { flex: 1; margin-bottom: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="<a href="https://ibb.co.com/JFvkRknD"><img src="https://i.ibb.co.com/JFvkRknD/Chat-GPT-Image-5-Jun-2026-22-30-27.png" alt="Chat-GPT-Image-5-Jun-2026-22-30-27" border="0"></a>" alt="Logo Edunexa">
    </div>

    <h2>Buku Kas Edunexa</h2>
    
    <div class="form-group">
        <div class="form-row">
            <div style="flex: 1;">
                <label for="tanggal">Tanggal Transaksi</label>
                <input type="date" id="tanggal" style="margin-top: 8px;">
            </div>
            <div style="flex: 1;">
                <label>Jenis Transaksi</label>
                <div class="toggle-group" style="margin-top: 8px;">
                    <button class="toggle-btn active" id="btnPemasukan" onclick="setJenis('Pemasukan')">Pemasukan</button>
                    <button class="toggle-btn" id="btnPengeluaran" onclick="setJenis('Pengeluaran')">Pengeluaran</button>
                </div>
            </div>
        </div>

        <label for="uraian">Uraian Kegiatan</label>
        <textarea id="uraian" placeholder="Contoh: Saldo Awal / Pembelian ATK"></textarea>
        
        <label for="nominal">Nominal (Rp)</label>
        <input type="text" id="nominal" inputmode="numeric" placeholder="0" oninput="formatRupiah(this)">
        
        <button class="btn-add" onclick="tambahData()">+ Tambah Transaksi</button>
    </div>

    <div class="table-responsive">
        <table id="tabelKas">
            <thead>
                <tr>
                    <th>Tanggal</th><th>Uraian</th><th>Pemasukan</th><th>Pengeluaran</th><th>Saldo</th>
                </tr>
            </thead>
            <tbody id="bodyKas"></tbody>
        </table>
    </div>

    <div id="totalSaldo">Total Saldo: Rp 0</div>
    
    <button class="btn-share" onclick="shareCSV()">
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.5 16.5c-1.1 0-2.1.5-2.7 1.2l-6.8-3.9c.1-.4.1-.8.1-1.3s0-.9-.1-1.3l6.8-3.9c.6.7 1.6 1.2 2.7 1.2 2.2 0 4-1.8 4-4s-1.8-4-4-4-4 1.8-4 4c0 .4 0 .8.1 1.3L6.8 9.7c-.6-.7-1.6-1.2-2.7-1.2-2.2 0-4 1.8-4 4s1.8 4 4 4c1.1 0 2.1-.5 2.7-1.2l6.8 3.9c-.1.4-.1.8-.1 1.3 0 2.2 1.8 4 4 4s4-1.8 4-4-1.8-4-4-4z"/>
        </svg>
        Bagikan Laporan (CSV)
    </button>
</div>

<script>
    let jenisTransaksi = "Pemasukan";
    let saldoAkhir = 0;

    // Fungsi untuk membuat pemisah ribuan saat diketik
    function formatRupiah(element) {
        // Hapus karakter selain angka
        let value = element.value.replace(/[^0-9]/g, '');
        // Tambahkan pemisah titik
        if (value) {
            element.value = parseInt(value, 10).toLocaleString('id-ID');
        } else {
            element.value = '';
        }
    }

    function setJenis(jenis) {
        jenisTransaksi = jenis;
        
        const btnPemasukan = document.getElementById("btnPemasukan");
        const btnPengeluaran = document.getElementById("btnPengeluaran");

        if (jenis === "Pemasukan") {
            btnPemasukan.classList.add("active");
            btnPengeluaran.classList.remove("active");
        } else {
            btnPengeluaran.classList.add("active");
            btnPemasukan.classList.remove("active");
        }
    }

    function tambahData() {
        const tgl = document.getElementById("tanggal").value;
        const uraian = document.getElementById("uraian").value;
        
        // Ambil nilai nominal, hapus semua titik, lalu ubah ke integer
        const nominalInput = document.getElementById("nominal").value.replace(/\./g, '');
        const nominal = parseInt(nominalInput) || 0;

        if (!tgl || !uraian || !nominal) { 
            alert("Mohon lengkapi semua data transaksi!"); 
            return; 
        }

        const table = document.getElementById("bodyKas");

        if (table.rows.length === 0 && jenisTransaksi === "Pengeluaran") {
            alert("Data awal harus berupa Pemasukan sebagai saldo awal.");
            return;
        }

        if (jenisTransaksi === "Pengeluaran" && nominal > saldoAkhir) {
            alert("Peringatan: Saldo tidak mencukupi untuk pengeluaran ini!");
            return;
        }

        const row = table.insertRow();
        
        const tglObj = new Date(tgl);
        const tglFormat = tglObj.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
        
        row.insertCell(0).innerText = tglFormat;
        row.insertCell(1).innerText = uraian;
        
        const nominalStr = nominal.toLocaleString('id-ID');

        if (jenisTransaksi === "Pemasukan") {
            row.insertCell(2).innerText = nominalStr;
            row.insertCell(3).innerText = "-";
            saldoAkhir += nominal;
        } else {
            row.insertCell(2).innerText = "-";
            row.insertCell(3).innerText = nominalStr;
            saldoAkhir -= nominal;
        }

        row.insertCell(4).innerText = saldoAkhir.toLocaleString('id-ID');
        document.getElementById("totalSaldo").innerText = "Total Saldo: Rp " + saldoAkhir.toLocaleString('id-ID');

        document.getElementById("uraian").value = "";
        document.getElementById("nominal").value = "";
    }

    async function shareCSV() {
        let csv = "Tanggal,Uraian,Pemasukan,Pengeluaran,Saldo\n";
        document.querySelectorAll("#tabelKas tbody tr").forEach(row => {
            let cols = row.querySelectorAll("td");
            let pemasukan = cols[2].innerText.replace(/\./g, '').replace('-', '0');
            let pengeluaran = cols[3].innerText.replace(/\./g, '').replace('-', '0');
            let saldo = cols[4].innerText.replace(/\./g, '').replace('-', '0'); 
            
            csv += `${cols[0].innerText},"${cols[1].innerText}",${pemasukan},${pengeluaran},${saldo}\n`;
        });

        const file = new File([csv], "Buku_Kas_Edunexa.csv", { type: "text/csv" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ 
                    files: [file], 
                    title: "Buku Kas Edunexa", 
                    text: "Laporan Buku Kas Edunexa terbaru terlampir." 
                });
            } catch (err) { 
                console.log("Membatalkan share:", err); 
            }
        } else {
            alert("Browser/Perangkat ini belum mendukung fitur bagikan otomatis.");
        }
    }
</script>
</body>
</html>
