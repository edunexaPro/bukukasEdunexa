<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas Edunexa</title>
    <style>
        /* Menggunakan font sistem yang modern dan bersih */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            margin: 0; 
            padding: 20px 10px; 
            background-color: #f1f5f9; 
            color: #334155;
        }

        /* Desain Card Utama */
        .container { 
            max-width: 900px; 
            margin: auto; 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); 
        }

        h2 {
            text-align: center;
            color: #1e293b;
            margin-top: 0;
            margin-bottom: 25px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        
        /* Desain Form */
        .form-group { 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            margin-bottom: 30px; 
            background: #f8fafc;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            margin-bottom: -10px;
        }

        input, textarea, button { 
            padding: 12px; 
            border: 1px solid #cbd5e1; 
            border-radius: 6px; 
            width: 100%; 
            box-sizing: border-box; 
            font-family: inherit; 
            font-size: 14px;
            transition: all 0.2s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        textarea { resize: vertical; min-height: 80px; } 
        
        /* Toggle Button Pemasukan/Pengeluaran */
        .toggle-group { display: flex; gap: 8px; }
        .toggle-btn { 
            flex: 1; 
            cursor: pointer; 
            border: 1px solid #cbd5e1; 
            background: white; 
            color: #64748b; 
            font-weight: 600; 
        }
        
        .toggle-btn:hover { background: #f1f5f9; }
        
        /* Warna dinamis untuk toggle */
        #btnPemasukan.active { background: #10b981; color: white; border-color: #10b981; }
        #btnPengeluaran.active { background: #ef4444; color: white; border-color: #ef4444; }

        /* Desain Tombol Aksi */
        .btn-add { 
            background-color: #3b82f6; 
            color: white; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 5px;
        }
        .btn-add:hover { background-color: #2563eb; }

        .btn-share { 
            background-color: #10b981; 
            color: white; 
            border: none; 
            width: 100%; 
            margin-top: 20px; 
            font-weight: 600; 
            cursor: pointer; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-share:hover { background-color: #059669; }

        /* Desain Tabel Profesional */
        .table-responsive { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; background: white; }
        th, td { padding: 14px 12px; font-size: 14px; border-bottom: 1px solid #e2e8f0; }
        
        th { 
            background-color: #f8fafc; 
            color: #475569; 
            font-weight: 600; 
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #cbd5e1;
        }

        tbody tr:hover { background-color: #f1f5f9; } /* Efek hover pada baris */
        
        /* Penyesuaian Kolom (Standar Akuntansi) */
        th:nth-child(1), td:nth-child(1) { text-align: center; width: 15%; } /* Tanggal */
        th:nth-child(2), td:nth-child(2) { text-align: left; width: 35%; } /* Uraian */
        th:nth-child(3), td:nth-child(3),
        th:nth-child(4), td:nth-child(4),
        th:nth-child(5), td:nth-child(5) { 
            text-align: right; /* Angka uang harus rata kanan */
            font-family: "Courier New", Courier, monospace; /* Font monospaced untuk angka agar sejajar */
            font-weight: 600;
        }
        
        td:nth-child(3) { color: #10b981; } /* Warna hijau untuk pemasukan */
        td:nth-child(4) { color: #ef4444; } /* Warna merah untuk pengeluaran */
        td:nth-child(5) { background-color: #f8fafc; color: #1e293b; } /* Highlight kolom saldo */
        
        /* Desain Widget Saldo Akhir */
        #totalSaldo { 
            font-weight: 700; 
            font-size: 1.4em; 
            margin-top: 25px; 
            padding: 20px; 
            background: linear-gradient(135deg, #1e293b, #334155); 
            color: white;
            text-align: right; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Responsive untuk layar komputer */
        @media (min-width: 768px) {
            .form-row { display: flex; gap: 15px; }
            .form-row > * { flex: 1; margin-bottom: 0; }
        }
    </style>
</head>
<body>

<div class="container">
