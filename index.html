<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buku Kas Edunexa</title>
    <style>
        body { font-family: sans-serif; margin: 10px; background-color: #f8f9fa; }
        .container { max-width: 800px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        input, button { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        /* Toggle Button */
        .toggle-group { display: flex; gap: 5px; }
        .toggle-btn { flex: 1; cursor: pointer; border: 1px solid #007bff; background: white; color: #007bff; }
        .toggle-btn.active { background: #007bff; color: white; }

        .table-responsive { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 14px; }
        th { background-color: #343a40; color: white; }
        
        /* Tinggi kolom uraian */
        td:nth-child(2) { min-width: 150px; text-align: left; } 
        
        .btn-add { background-color: #28a745; color: white; border: none; }
        .btn-share { background-color: #17a2b8; color: white; border: none; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Buku Kas Edunexa</h2>
    
    <div class="form-group">
        <input type="date" id="tanggal">
        <input type="text" id="uraian" placeholder="Uraian Kegiatan (Tinggi kolom disesuaikan)" style="height: 50px;">
        <div class="toggle-group">
            <button class="toggle-btn active" id="btnPemasukan" onclick="setJenis('Pemasukan')">Pemasukan</button>
            <button class="toggle-btn" id="btnPengeluaran" onclick="setJenis('Pengeluaran')">Pengeluaran</button>
        </div>
        <input type="number" id="nominal" placeholder="Nominal (Rp)">
        <button class="btn-add" onclick="tambahData()">Tambah Transaksi</button>
    </div>

    <div class="table-responsive">
        <table id="tabelKas">
            <thead>
                <tr>
                    <th>Tanggal</th><th>Uraian</th><th>Pemasukan</th><th>Pengeluaran</th>
                </tr>
            </thead>
            <tbody id="bodyKas"></tbody>
        </table>
    </div>

    <button class="btn-share" onclick="shareCSV()">Bagikan ke WhatsApp</button>
</div>

<script>
    let jenisTransaksi = "Pemasukan";

    function setJenis(jenis) {
        jenisTransaksi = jenis;
        document.getElementById("btnPemasukan").classList.toggle("active", jenis === "Pemasukan");
        document.getElementById("btnPengeluaran").classList.toggle("active", jenis === "Pengeluaran");
    }

    function tambahData() {
        const tgl = document.getElementById("tanggal").value;
        const uraian = document.getElementById("uraian").value;
        const nominal = document.getElementById("nominal").value;

        if (!tgl || !uraian || !nominal) { alert("Lengkapi data!"); return; }

        const table = document.getElementById("bodyKas");
        const row = table.insertRow();
        
        row.insertCell(0).innerText = tgl;
        row.insertCell(1).innerText = uraian;
        row.insertCell(2).innerText = (jenisTransaksi === "Pemasukan") ? nominal : "";
        row.insertCell(3).innerText = (jenisTransaksi === "Pengeluaran") ? nominal : "";
    }

    async function shareCSV() {
        let csv = "Tanggal,Uraian,Pemasukan,Pengeluaran\n";
        document.querySelectorAll("#tabelKas tbody tr").forEach(row => {
            let cols = row.querySelectorAll("td");
            csv += `${cols[0].innerText},${cols[1].innerText},${cols[2].innerText},${cols[3].innerText}\n`;
        });

        const file = new File([csv], "Buku_Kas_Edunexa.csv", { type: "text/csv" });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], title: "Buku Kas", text: "Data Kas Edunexa" });
            } catch (err) { alert("Gagal membagikan: " + err); }
        } else {
            alert("Fitur bagikan tidak didukung di browser ini.");
        }
    }
</script>
</body>
</html>
